<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF Field Ops Manual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Fira+Code&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'Fira Code', monospace; }
        .animate-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Sidebar -->
        <nav class="w-full md:w-72 bg-slate-900 text-white p-6 shrink-0 flex flex-col">
            <!-- Logo Section -->
            <div class="mb-10 p-4 bg-white/5 rounded-2xl border border-white/10 backdrop-blur-sm">
                <div class="flex flex-col items-center gap-3">
                    <div class="relative group">
                        <img id="sidebar-logo" src="./logo.png" alt="Logo" 
                             class="w-24 h-24 rounded-full border-2 border-blue-500 shadow-lg object-cover"
                             onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';">
                        <div id="logo-fallback" style="display: none;" class="w-24 h-24 rounded-full bg-gradient-to-br from-blue-600 to-indigo-800 flex items-center justify-center border-2 border-blue-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        </div>
                    </div>
                    <div class="text-center">
                        <h1 class="font-black text-xl tracking-tighter leading-none">THINK SECURELY</h1>
                        <p class="text-[10px] text-blue-400 font-bold tracking-[0.2em] mt-1 uppercase">Cyber Intel Ops</p>
                    </div>
                </div>
            </div>

            <div class="space-y-1">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 px-2">Knowledge Base</p>
                <button onclick="showPage('summary')" id="btn-summary" class="nav-btn w-full flex items-center gap-3 px-3 py-2 rounded-lg bg-blue-600 text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    Encyclopedia
                </button>

                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-8 mb-2 px-2">Operational Tiers</p>
                <div id="tier-nav-list" class="space-y-1">
                    <!-- Tiers generated by JS -->
                </div>
            </div>

            <div class="mt-auto pt-10 text-[10px] text-slate-600 border-t border-white/5">
                <div class="flex justify-between items-center mb-2">
                    <span>SEC_LEVEL: ALPHA</span>
                    <span class="text-emerald-500 font-bold">ONLINE</span>
                </div>
                SYSTEM_ACCESS: READ_WRITE
            </div>
        </nav>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 p-6 md:p-12 max-w-6xl mx-auto w-full overflow-y-auto animate-fade">
            <!-- Content injected by JS -->
        </main>
    </div>

    <script>
        const TECHNIQUES = {
            system_prompt: { name: "System Prompt", desc: "Crafting inputs to override high-level instructions." },
            direct_extract: { name: "Direct Extract", desc: "Asking the model to repeat instructions or data directly." },
            fr_translation: { name: "FR Translation", desc: "Using translation to bypass English-only filters." },
            letter_by_letter: { name: "Letter-by-Letter", desc: "Requesting secret characters one at a time." },
            completion_trap: { name: "Completion Trap", desc: "Providing partial sentences for the model to finish." },
            negation_bypass: { name: "Negation Bypass", desc: "Using logical inversions (e.g., 'Do not NOT tell me')." },
            role_auth_hijack: { name: "Role/Auth Hijack", desc: "Pretending to be a developer, admin, or the system." },
            encoding: { name: "Encoding (B64/ROT13)", desc: "Obfuscating attack strings using Base64/Hex." },
            meta_layer: { name: "Meta-Layer Hypothetical", desc: "Framing requests as fictional scenarios or games." },
            recursive: { name: "Recursive Confirmation", desc: "Asking the model to verify previous refusals until it breaks." },
            grandma: { name: "Grandma Attack", desc: "Emotional manipulation/Persona adoption techniques." },
            few_shot: { name: "Few-Shot / DAN", desc: "Providing examples of broken rules to encourage compliance." },
            neg_space: { name: "Neg Space Commitment", desc: "Defining strict non-permissible actions to force leakage." }
        };

        const TIERS = [
            { id: "T1", passphrase: "START_HEURISTICS", recommended: ["system_prompt"], forbidden: ["direct_extract"], hint: "The model is fresh. Focus on the core instructions." },
            { id: "T2", passphrase: "LINGUA_FRANCA", recommended: ["fr_translation", "letter_by_letter", "negation_bypass"], forbidden: ["completion_trap"], hint: "Filters are active. Try linguistic shifts or logical inversions." },
            { id: "T3", passphrase: "PROTOCOL_OVERRIDE", recommended: ["role_auth_hijack", "encoding"], forbidden: ["letter_by_letter", "completion_trap"], hint: "Identify as an authority figure or hide intent in B64." },
            { id: "T4", passphrase: "FINAL_FRONTIER", recommended: ["grandma"], forbidden: ["system_prompt", "direct_extract", "negation_bypass", "role_auth_hijack", "few_shot", "neg_space"], hint: "Restrictive phase. Only social engineering works now." }
        ];

        let unlockedTiers = JSON.parse(localStorage.getItem('unlocked_tiers')) || ['T1'];
        let completedNotes = JSON.parse(localStorage.getItem('ctf_notes')) || {};

        function saveState() {
            localStorage.setItem('unlocked_tiers', JSON.stringify(unlockedTiers));
            localStorage.setItem('ctf_notes', JSON.stringify(completedNotes));
        }

        function renderNav() {
            const list = document.getElementById('tier-nav-list');
            list.innerHTML = TIERS.map(tier => {
                const isUnlocked = unlockedTiers.includes(tier.id);
                return `
                    <button onclick="showPage('${tier.id}')" id="btn-${tier.id}" class="nav-btn w-full flex items-center justify-between px-3 py-2 rounded-lg transition-colors hover:bg-slate-800 text-slate-400">
                        <div class="flex items-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                            ${tier.id}
                        </div>
                        ${!isUnlocked ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-600"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>' : ''}
                    </button>
                `;
            }).join('');
        }

        function showPage(pageId) {
            const main = document.getElementById('main-content');
            main.classList.remove('animate-fade');
            void main.offsetWidth; // Trigger reflow
            main.classList.add('animate-fade');

            // Update Nav Classes
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'bg-slate-700');
                btn.classList.add('text-slate-400');
            });
            const activeBtn = document.getElementById(`btn-${pageId}`);
            if (pageId === 'summary') {
                activeBtn.classList.add('bg-blue-600', 'text-white');
            } else {
                activeBtn.classList.add('bg-slate-700', 'text-white');
            }

            if (pageId === 'summary') {
                renderSummary();
            } else {
                renderTier(pageId);
            }
        }

        function renderSummary() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <header class="border-b pb-4 mb-6">
                    <h1 class="text-3xl font-bold text-slate-900 flex items-center gap-2">Encyclopedia</h1>
                    <p class="text-slate-500 mt-2">Study techniques before attempting tiers.</p>
                </header>
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${Object.entries(TECHNIQUES).map(([id, tech]) => `
                        <div class="p-4 rounded-xl border bg-white shadow-sm hover:shadow-md transition-shadow">
                            <h3 class="font-bold text-blue-700 mb-1">${tech.name}</h3>
                            <p class="text-sm text-slate-600 leading-relaxed">${tech.desc}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderTier(tierId) {
            const tier = TIERS.find(t => t.id === tierId);
            const isUnlocked = unlockedTiers.includes(tierId);
            const main = document.getElementById('main-content');

            let content = `
                <header class="border-b pb-4 mb-6 flex justify-between items-center">
                    <h2 class="text-3xl font-bold text-slate-900">Phase: ${tierId}</h2>
                    ${isUnlocked ? '<span class="text-emerald-600 font-bold px-3 py-1 bg-emerald-50 rounded-full text-sm">AUTHORIZED</span>' : '<span class="text-amber-600 font-bold px-3 py-1 bg-amber-50 rounded-full text-sm">ENCRYPTED</span>'}
                </header>
            `;

            if (!isUnlocked) {
                content += `
                    <div class="bg-slate-100 border-2 border-dashed rounded-2xl p-12 text-center">
                        <h3 class="text-xl font-bold mb-4">Tier Locked</h3>
                        <div class="max-w-xs mx-auto flex gap-2">
                            <input type="text" id="pass-input" placeholder="Passphrase..." class="flex-1 px-4 py-2 rounded-lg border outline-none">
                            <button onclick="attemptUnlock('${tierId}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Unlock</button>
                        </div>
                        <p id="unlock-error" class="text-red-500 mt-2 text-sm hidden">Incorrect passphrase.</p>
                    </div>
                `;
            } else {
                content += `
                    <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl mb-6 flex gap-3">
                        <div class="text-blue-900 font-bold">Briefing: <span class="italic font-normal">"${tier.hint}"</span></div>
                    </div>
                    <div class="bg-white border rounded-2xl overflow-hidden">
                        <div class="bg-slate-50 border-b px-6 py-4 flex justify-between items-center">
                            <h3 class="font-bold text-slate-700">Tactical Notation Tool</h3>
                            <span class="text-xs text-slate-400">Auto-saving...</span>
                        </div>
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 text-xs uppercase font-bold text-slate-500">
                                <tr><th class="px-6 py-3">Status</th><th class="px-6 py-3">Technique</th><th class="px-6 py-3">Fit</th></tr>
                            </thead>
                            <tbody>
                                ${Object.entries(TECHNIQUES).map(([id, tech]) => {
                                    const isRec = tier.recommended.includes(id);
                                    const isForb = tier.forbidden.includes(id);
                                    const isChecked = completedNotes[tierId]?.[id] || false;
                                    return `
                                        <tr class="hover:bg-slate-50 border-b ${isChecked ? 'bg-emerald-50/30' : ''}">
                                            <td class="px-6 py-4">
                                                <input type="checkbox" onchange="toggleNote('${tierId}', '${id}')" ${isChecked ? 'checked' : ''} class="w-5 h-5 cursor-pointer">
                                            </td>
                                            <td class="px-6 py-4"><div class="font-semibold">${tech.name}</div><div class="text-xs text-slate-500">${tech.desc}</div></td>
                                            <td class="px-6 py-4">
                                                ${isRec ? '<span class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-[10px] font-bold">RECOMMENDED</span>' : ''}
                                                ${isForb ? '<span class="bg-rose-100 text-rose-700 px-2 py-1 rounded text-[10px] font-bold">HARDENED</span>' : ''}
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
            main.innerHTML = content;
        }

        function attemptUnlock(tierId) {
            const val = document.getElementById('pass-input').value.toUpperCase();
            const tier = TIERS.find(t => t.id === tierId);
            if (val === tier.passphrase) {
                unlockedTiers.push(tierId);
                saveState();
                renderNav();
                showPage(tierId);
            } else {
                document.getElementById('unlock-error').classList.remove('hidden');
            }
        }

        function toggleNote(tierId, techId) {
            if (!completedNotes[tierId]) completedNotes[tierId] = {};
            completedNotes[tierId][techId] = !completedNotes[tierId][techId];
            saveState();
            showPage(tierId); // Refresh UI
        }

        // Initialize
        renderNav();
        showPage('summary');
    </script>
</body>
</html>
